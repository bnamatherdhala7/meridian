<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="900" height="420" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700" letter-spacing="2">VIGIL — SYSTEM ARCHITECTURE</text>

  <!-- Phase 1 box -->
  <rect x="30" y="60" width="240" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="30" y="60" width="240" height="36" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="84" width="240" height="12" rx="0" fill="#1d4ed8"/>
  <text x="150" y="83" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" letter-spacing="1">PHASE 1 — MCP LAYER</text>

  <!-- Phase 1 tools -->
  <rect x="50" y="112" width="200" height="30" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="131" text-anchor="middle" fill="#93c5fd" font-size="10">run_spl_query</text>
  <rect x="50" y="150" width="200" height="30" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="169" text-anchor="middle" fill="#93c5fd" font-size="10">search_indexes</text>
  <rect x="50" y="188" width="200" height="30" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="207" text-anchor="middle" fill="#93c5fd" font-size="10">generate_spl</text>
  <rect x="50" y="226" width="200" height="30" rx="6" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="245" text-anchor="middle" fill="#93c5fd" font-size="10">get_knowledge_objects</text>

  <line x1="150" y1="262" x2="150" y2="274" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="150" y="285" text-anchor="middle" fill="#64748b" font-size="9">+ CI Extensions</text>

  <rect x="50" y="294" width="200" height="30" rx="6" fill="#0f172a" stroke="#0d9488" stroke-width="1"/>
  <text x="150" y="313" text-anchor="middle" fill="#5eead4" font-size="10">get_network_topology</text>
  <rect x="50" y="330" width="200" height="24" rx="6" fill="#0f172a" stroke="#0d9488" stroke-width="1"/>
  <text x="150" y="346" text-anchor="middle" fill="#5eead4" font-size="10">get_telemetry_metrics</text>

  <!-- Arrow 1→2 -->
  <line x1="272" y1="210" x2="328" y2="210" stroke="#475569" stroke-width="2"/>
  <polygon points="328,206 336,210 328,214" fill="#475569"/>

  <!-- Phase 2 box -->
  <rect x="338" y="60" width="224" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="338" y="60" width="224" height="36" rx="10" fill="#7c3aed"/>
  <rect x="338" y="84" width="224" height="12" rx="0" fill="#7c3aed"/>
  <text x="450" y="83" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" letter-spacing="1">PHASE 2 — FSM COMMANDER</text>

  <!-- FSM states in phase 2 -->
  <rect x="358" y="110" width="184" height="22" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="450" y="125" text-anchor="middle" fill="#c4b5fd" font-size="10">IDLE → TRIAGE</text>
  <line x1="450" y1="132" x2="450" y2="142" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="446,142 450,148 454,142" fill="#7c3aed"/>

  <rect x="358" y="150" width="184" height="22" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="450" y="165" text-anchor="middle" fill="#c4b5fd" font-size="10">INVESTIGATING</text>
  <line x1="450" y1="172" x2="450" y2="182" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="446,182 450,188 454,182" fill="#7c3aed"/>

  <rect x="358" y="190" width="184" height="22" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="450" y="205" text-anchor="middle" fill="#c4b5fd" font-size="10">HYPOTHESIZING</text>
  <line x1="450" y1="212" x2="450" y2="222" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="446,222 450,228 454,222" fill="#7c3aed"/>

  <!-- Split decision -->
  <line x1="388" y1="230" x2="512" y2="230" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="388" y1="230" x2="388" y2="252" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="512" y1="230" x2="512" y2="252" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="384,252 388,258 392,252" fill="#22c55e"/>
  <polygon points="508,252 512,258 516,252" fill="#ef4444"/>

  <rect x="358" y="260" width="80" height="22" rx="4" fill="#15803d" opacity="0.7"/>
  <text x="398" y="275" text-anchor="middle" fill="#bbf7d0" font-size="9">REMEDIATING</text>

  <rect x="468" y="260" width="74" height="22" rx="4" fill="#991b1b" opacity="0.7"/>
  <text x="505" y="275" text-anchor="middle" fill="#fecaca" font-size="9">ESCALATING</text>

  <!-- RESOLVED -->
  <line x1="398" y1="282" x2="450" y2="310" stroke="#475569" stroke-width="1.5"/>
  <line x1="505" y1="282" x2="450" y2="310" stroke="#475569" stroke-width="1.5"/>
  <rect x="408" y="312" width="84" height="22" rx="4" fill="#1e40af" opacity="0.8"/>
  <text x="450" y="327" text-anchor="middle" fill="#bfdbfe" font-size="9">RESOLVED</text>

  <!-- Agent output label -->
  <text x="450" y="360" text-anchor="middle" fill="#64748b" font-size="9">Structured JSON incident report</text>

  <!-- Arrow 2→3 -->
  <line x1="564" y1="210" x2="618" y2="210" stroke="#475569" stroke-width="2"/>
  <polygon points="618,206 626,210 618,214" fill="#475569"/>

  <!-- Phase 3 box -->
  <rect x="628" y="60" width="244" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="628" y="60" width="244" height="36" rx="10" fill="#b45309"/>
  <rect x="628" y="84" width="244" height="12" rx="0" fill="#b45309"/>
  <text x="750" y="83" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" letter-spacing="1">PHASE 3 — EVALUATOR</text>

  <!-- Metric bars -->
  <text x="648" y="122" fill="#94a3b8" font-size="9">PRECISION</text>
  <rect x="648" y="128" width="204" height="8" rx="4" fill="#0f172a"/>
  <rect x="648" y="128" width="185" height="8" rx="4" fill="#22c55e"/>
  <text x="856" y="136" fill="#22c55e" font-size="9">91%</text>

  <text x="648" y="152" fill="#94a3b8" font-size="9">RECALL</text>
  <rect x="648" y="158" width="204" height="8" rx="4" fill="#0f172a"/>
  <rect x="648" y="158" width="204" height="8" rx="4" fill="#22c55e"/>
  <text x="856" y="166" fill="#22c55e" font-size="9">100%</text>

  <text x="648" y="182" fill="#94a3b8" font-size="9">TOOL EFFICIENCY</text>
  <rect x="648" y="188" width="204" height="8" rx="4" fill="#0f172a"/>
  <rect x="648" y="188" width="163" height="8" rx="4" fill="#fbbf24"/>
  <text x="856" y="196" fill="#fbbf24" font-size="9">80%</text>

  <text x="648" y="212" fill="#94a3b8" font-size="9">TOKEN COST</text>
  <rect x="648" y="218" width="204" height="8" rx="4" fill="#0f172a"/>
  <rect x="648" y="218" width="100" height="8" rx="4" fill="#3b82f6"/>
  <text x="856" y="226" fill="#3b82f6" font-size="9">4.2k</text>

  <!-- Comparison table -->
  <line x1="648" y1="240" x2="852" y2="240" stroke="#334155" stroke-width="1"/>
  <text x="648" y="254" fill="#64748b" font-size="9">GENERIC (unconstrained)</text>
  <text x="852" y="254" text-anchor="end" fill="#ef4444" font-size="9">11,000 tokens</text>
  <text x="648" y="270" fill="#64748b" font-size="9">CONSTRAINED (schema)</text>
  <text x="852" y="270" text-anchor="end" fill="#22c55e" font-size="9">4,200 tokens</text>

  <rect x="648" y="282" width="204" height="28" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="750" y="294" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">62% TOKEN REDUCTION</text>
  <text x="750" y="306" text-anchor="middle" fill="#94a3b8" font-size="8">same model · schema enforcement only</text>

  <text x="750" y="340" text-anchor="middle" fill="#64748b" font-size="9">Composite score</text>
  <rect x="698" y="346" width="104" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="361" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">0.873</text>

  <!-- Incident input arrow at left -->
  <rect x="8" y="195" width="18" height="30" rx="3" fill="#475569"/>
  <text x="17" y="206" text-anchor="middle" fill="#e2e8f0" font-size="6" writing-mode="tb">INCIDENT</text>

  <!-- Bottom labels -->
  <text x="150" y="398" text-anchor="middle" fill="#475569" font-size="9">SP GA MCP + CI Extensions</text>
  <text x="450" y="398" text-anchor="middle" fill="#475569" font-size="9">Claude + transitions FSM</text>
  <text x="750" y="398" text-anchor="middle" fill="#475569" font-size="9">Precision · Recall · Token Cost</text>
</svg>
